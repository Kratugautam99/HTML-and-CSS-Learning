<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Filter Property</title>
  <style>
    .container {
      display: flex;
      gap: 20px;
    }

    img {
      width: 300px;
      height: 200px;
      object-fit: cover;
      border: 2px solid black;
    }

    /* Image 1: Brightness + Contrast */
    .img1 {
      filter: brightness(120%) contrast(110%);
    }

    /* Image 2: Blur + Sepia */
    .img2 {
      filter: blur(3px) sepia(60%);
    }

    /* Image 3: Grayscale + Hue Rotation */
    .img3 {
      filter: grayscale(50%) hue-rotate(90deg);
    }
  </style>
</head>
<body>
  <h1>CSS Filters Applied</h1>
  <div class="container">
    <img class="img1" src="https://img.freepik.com/free-photo/programming-background-with-person-working-with-codes-computer_23-2150010125.jpg?size=626&ext=jpg" alt="Programming Background">
    <img class="img2" src="https://c.ndtvimg.com/2023-09/154fgjlg_shah-rukh-khan-_625x300_23_September_23.jpg" alt="Shah Rukh Khan">
    <img class="img3" src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg" alt="Akshay Kumar">
  </div>
</body>
</html>
